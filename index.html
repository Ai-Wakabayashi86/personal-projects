<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界の国クイズ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌏 世界の国クイズ</h1>

    <div id="modeSelect">
        <button class="modeFlag" onclick="setMode('flag')">
            🇯🇵 国旗クイズ
        </button>

        <button class="modeTrivia" onclick="setMode('trivia')">
            🗼 雑学クイズ
        </button>
    </div>

    <div id="levelSelect" style="display: none;">
        <button class="level1" onclick="setLevel(1)">Lv.1 初心者</button>
        <button class="level2" onclick="setLevel(2)">Lv.2 見習い</button>
        <button class="level3" onclick="setLevel(3)">Lv.3 冒険者</button>
        <button class="level4" onclick="setLevel(4)">Lv.4 熟練者</button>
        <button class="level5" onclick="setLevel(5)">Lv.5 エリート</button>
        <button class="level6" onclick="setLevel(6)">Lv.6 達人</button>
        <button class="level7" onclick="setLevel(7)">Lv.7 英雄</button>
        <button class="level8" onclick="setLevel(8)">Lv.8 伝説</button>
        <button class="level9" onclick="setLevel(9)">Lv.9 魔王軍</button>
        <button class="level10" onclick="setLevel(10)">Lv.10 魔王級</button>
    </div>

    <div id="score">スコア: 0</div>

    <!-- 問題表示エリア -->
    <div id="question" class="question"></div>

    <!-- 選択肢 -->
    <div id="choices"></div>

    <!-- 結果表示 -->
    <div id="result"></div>

    <script src="countries.js"></script>
    <script src="script.js"></script>

</body>
</html>
